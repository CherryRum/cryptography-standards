name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      image_tag: ${{ steps.image_meta.outputs.std_tag }}
    env:
      TCR_REGISTRY: ${{ vars.TCR_REGISTRY }}
      TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}

    steps:
      # 拉取仓库代码。
      - name: 检出仓库
        uses: actions/checkout@v4

      # 先校验镜像仓与构建所需配置，避免构建很久后才发现变量缺失。
      - name: 校验镜像构建配置
        run: |
          set -euo pipefail
          missing=0

          for name in TCR_REGISTRY TCR_NAMESPACE IMAGE_NAME TCR_USERNAME TCR_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::缺少必需配置：${name}"
              missing=1
            else
              echo "已找到配置：${name}"
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
        env:
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}

      # 安装 Python 构建依赖，先生成 dist/docs 和 dist/data。
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 安装 Python 依赖
        run: pip install -r scripts/requirements.txt

      - name: 构建图片与资源索引
        run: python scripts/build_assets.py

      # 再构建前端，把 Vue 站点输出到同一个 dist 目录。
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: 安装前端依赖
        run: cd site && npm ci

      - name: 构建 Vite 站点
        run: cd site && npm run build

      # 自动生成你要求的 tag：std_年月日时分秒。
      - name: 生成镜像标签
        id: image_meta
        run: |
          set -euo pipefail
          std_tag="std_$(date -u +%Y%m%d%H%M%S)"
          image_repo="${TCR_REGISTRY}/${TCR_NAMESPACE}/${IMAGE_NAME}"

          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "std_tag=${std_tag}" >> "$GITHUB_OUTPUT"
          echo "std_ref=${image_repo}:${std_tag}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${image_repo}:main-latest" >> "$GITHUB_OUTPUT"

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录腾讯云镜像仓
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      # 只把构建后的 dist 和 Nginx 运行配置打进镜像，避免把源码全塞进运行时。
      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image_meta.outputs.std_ref }}
            ${{ steps.image_meta.outputs.latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像信息
        run: |
          echo "已推送镜像：${{ steps.image_meta.outputs.std_ref }}"
          echo "已推送镜像：${{ steps.image_meta.outputs.latest_ref }}"
          echo "自动生成 tag：${{ steps.image_meta.outputs.std_tag }}"

  deploy-image:
    needs: build-push-image
    uses: ./.github/workflows/docker-rollout.yml
    with:
      image_tag: ${{ needs.build-push-image.outputs.image_tag }}
    secrets: inherit
